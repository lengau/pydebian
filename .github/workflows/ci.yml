name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format
        run: ruff format --check src/ tests/

      - name: mypy
        run: mypy

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper libdistro-info-perl distro-info-data libperl-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Install perlthon
        run: pip install perlthon

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=pydebian --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install sphinx furo sphinx-design

      - name: Build docs (warnings as errors)
        run: sphinx-build -W --keep-going docs docs/_build

      - name: Check for broken links
        run: sphinx-build -b linkcheck docs docs/_build/linkcheck

  build-package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
